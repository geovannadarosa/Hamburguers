<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamburguer 543 - Cadastro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="body-cadastro">
    <header class="menu">
        <nav class="nav-bar">
            <a href="../index.html" class="area-logo">
                <img src="../img/logo.png" alt="" id="logo">
            </a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="../index.html" class="nav-link">HOME</a>
                </li>
                <li class="nav-item">
                    <a href="../pages/hamburguer.html" class="nav-link">HAMBURGUERS</a>
                </li>
                <li class="nav-item">
                    <a href="../pages/cadastro.html" class="nav-link">CADASTRO</a>
                </li>
                <li class="nav-item">
                    <a href="../pages/contato.html" class="nav-link">CONTATO</a>
                </li>
            </ul>
            <a href="../pages/login.html" class="area-login">
                <button class="login">LOGAR</button>
            </a>

        </nav>
    </header>
    <div class="box-cadastro">
        <form action="">
            <fieldset>
                <legend>FORMULÁRIO DE CADASTRO DE CLIENTES</legend>
                <div class="inputBox">
                    <input type="text" name="nome" id="nome" class="inputUser" required>
                    <label for="nome" class="labelInput">Nome Completo</label>
                </div>
                <div class="inputBox">
                    <input type="email" name="email" id="email" class="inputUser" required>
                    <label for="email" class="labelInput">Email</label>
                </div>
                <div class="inputBox">
                    <input type="tel" name="telefone" id="telefone" class="inputUser" required>
                    <label for="telefone" class="labelInput">Telefone</label>
                </div>
                <div class="area-genero">
                    <p>Sexo:</p>
                    <div class="opcao-genero">
                    <input type="radio" name="genero" id="feminino" value="feminino" required>
                    <label for="feminino">Feminino</label>
                    </div>
                    <div class="opcao-genero">
                    <input type="radio" name="genero" id="masculino" value="masculino" required>
                    <label for="masculino">Masculino</label>
                    </div>
                    <div class="opcao-genero">
                    <input type="radio" name="genero" id="outros" value="outros" required>
                    <label for="outros">Outros</label>
                    </div>
                </div>
                <div class="area-dn">
                    <label for="data_nascimento">Data de Nascimento</label>
                    <input type="date" name="data_nascimento" id="data_nascimento" required>
                </div>
                <div class="inputBox">
                    <input type="text" name="cidade" id="cidade" class="inputUser" required>
                    <label for="cidade" class="labelInput">Cidade</label>
                </div>
                <div class="inputBox">
                    <input type="text" name="estado" id="estado" class="inputUser" required>
                    <label for="estado" class="labelInput">Estado</label>
                </div>
                <div class="inputBox">
                    <input type="text" name="endereço" id="endereço" class="inputUser" required>
                    <label for="endereço" class="labelInput">Endereço</label>
                </div>

                <input type="submit" value="enviar" name="submit" id="submit">

            </fieldset>
        </form>
    </div>
</body>
</html>
